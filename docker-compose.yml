version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: citrus_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: citrus2026
      MYSQL_DATABASE: citrus_vision
      MYSQL_USER: citrus_user
      MYSQL_PASSWORD: citrus_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    networks:
      - citrus_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端 API 服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: citrus_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql+pymysql://citrus_user:citrus_pass@mysql:3306/citrus_vision
      SECRET_KEY: citrus-secret-key-change-in-production
      ALGORITHM_SERVICE_URL: http://algorithm:8001
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
    networks:
      - citrus_network
    depends_on:
      mysql:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000

  # 算法服务
  algorithm:
    build:
      context: ./algorithm-service
      dockerfile: Dockerfile
    container_name: citrus_algorithm
    restart: unless-stopped
    environment:
      MODEL_PATH: weights/best.pt
      DEVICE: cpu
    ports:
      - "8001:8001"
    volumes:
      - ./algorithm-service/weights:/app/weights
      - ./uploads:/app/uploads
    networks:
      - citrus_network
    command: uvicorn server:app --host 0.0.0.0 --port 8001

  # 前端 Nginx
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: citrus_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - citrus_network
    depends_on:
      - backend

volumes:
  mysql_data:
    driver: local

networks:
  citrus_network:
    driver: bridge
