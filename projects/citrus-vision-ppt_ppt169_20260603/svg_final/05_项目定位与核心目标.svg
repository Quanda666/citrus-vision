    <text x="126" y="174" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="17" font-weight="700" fill="#1F2A33">面向教学演示与产地初分场景的、工程完整的机器视觉品质检测 Web 系统（B/S，四层分离）</text>
  </g>

  
  
