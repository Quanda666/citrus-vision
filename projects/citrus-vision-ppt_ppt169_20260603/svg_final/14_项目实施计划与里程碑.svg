      <path fill="url(#barOrange)" d="M364,232 H896 A4,4 0 0 1 900,236 V250 A4,4 0 0 1 896,254 H364 A4,4 0 0 1 360,250 V236 A4,4 0 0 1 364,232 Z" />
      <text x="630" y="247" text-anchor="middle">公开集 + 网络采集 + 自建 · 清洗标注</text>

      <path fill="url(#barGreen)" d="M538,277 H749 A4,4 0 0 1 753,281 V295 A4,4 0 0 1 749,299 H538 A4,4 0 0 1 534,295 V281 A4,4 0 0 1 538,277 Z" />
      <text x="643" y="292" text-anchor="middle">结构图/E-R/类图/时序</text>

