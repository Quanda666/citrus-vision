<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="barGreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0E7C66" />
      <stop offset="100%" stop-color="#0A5A49" />
    </linearGradient>
    <linearGradient id="barOrange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F2811D" />
      <stop offset="100%" stop-color="#E0544A" />
    </linearGradient>
  </defs>

  <g id="bg"><rect width="1280" height="720" fill="#FFFFFF" /></g>

  
  <g id="header">
    <path fill="#0E7C66" d="M63,38 H63 A3,3 0 0 1 66,41 V87 A3,3 0 0 1 63,90 H63 A3,3 0 0 1 60,87 V41 A3,3 0 0 1 63,38 Z" />
    <text x="82" y="70" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="32" font-weight="800" fill="#1F2A33">项目实施计划与里程碑<tspan font-size="18" font-weight="400" fill="#5B6B73">（按课设阶段规划 · 假设 4 周）</tspan></text>
    <text x="84" y="96" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="14" fill="#5B6B73">需求 → 概要 → 详细 → 实现 → 测试，阶段产出即里程碑；关键路径并行启动，不等训练前才找数据</text>
  </g>

  
  <g id="task-list" font-family="'Microsoft YaHei', Arial, sans-serif">
    <rect x="60" y="176" width="1160" height="45" fill="#F4F7F6" />
    <rect x="60" y="266" width="1160" height="45" fill="#F4F7F6" />
    <rect x="60" y="356" width="1160" height="45" fill="#F4F7F6" />
    <rect x="60" y="446" width="1160" height="45" fill="#F4F7F6" />
    <text x="72" y="204" font-size="13.5" font-weight="700" fill="#1F2A33">选题确认 · 需求分析</text>
    <text x="72" y="249" font-size="13.5" font-weight="700" fill="#C2610A">数据采集与标注 <tspan font-size="11" fill="#F2811D">★关键</tspan></text>
    <text x="72" y="294" font-size="13.5" font-weight="700" fill="#1F2A33">概要 / 详细设计</text>
    <text x="72" y="339" font-size="13.5" font-weight="700" fill="#1F2A33">建库 · 分级原型出图</text>
    <text x="72" y="384" font-size="13.5" font-weight="700" fill="#1F2A33">前端页面 · 后端 API</text>
    <text x="72" y="429" font-size="13.5" font-weight="700" fill="#C2610A">YOLOv8 训练调优 · 集成 <tspan font-size="11" fill="#F2811D">★关键</tspan></text>
    <text x="72" y="474" font-size="13.5" font-weight="700" fill="#C2610A">算法 / 接口联调 <tspan font-size="11" fill="#F2811D">★关键</tspan></text>
    <text x="72" y="519" font-size="13.5" font-weight="700" fill="#1F2A33">系统测试 · 报告定稿 · 演示排练</text>
  </g>

  
  <g id="chartArea">
    
    <rect x="298" y="140" width="922" height="30" fill="#0E7C66" fill-opacity="0.08" />
    <text x="413" y="160" text-anchor="middle" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="13" font-weight="800" fill="#0A5A49">W1 · 立项与需求</text>
    <text x="644" y="160" text-anchor="middle" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="13" font-weight="800" fill="#0A5A49">W2 · 设计与原型</text>
    <text x="875" y="160" text-anchor="middle" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="13" font-weight="800" fill="#0A5A49">W3 · 编码实现</text>
    <text x="1105" y="160" text-anchor="middle" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="13" font-weight="800" fill="#0A5A49">W4 · 联调测试交付</text>
    
    <g stroke="#E2E8E9" stroke-width="1.5">
      <line x1="298" y1="140" x2="298" y2="536" />
      <line x1="528" y1="140" x2="528" y2="536" />
      <line x1="759" y1="140" x2="759" y2="536" />
      <line x1="990" y1="140" x2="990" y2="536" />
      <line x1="1220" y1="140" x2="1220" y2="536" />
    </g>
    <line x1="298" y1="536" x2="1220" y2="536" stroke="#CBD5E1" stroke-width="2" />
    
    
    <g id="bars" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="11.5" font-weight="700" fill="#FFFFFF">
      <path fill="url(#barGreen)" d="M308,187 H518 A4,4 0 0 1 522,191 V205 A4,4 0 0 1 518,209 H308 A4,4 0 0 1 304,205 V191 A4,4 0 0 1 308,187 Z" />
