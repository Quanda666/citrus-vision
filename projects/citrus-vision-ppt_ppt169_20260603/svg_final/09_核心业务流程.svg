    <text x="82" y="74" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="34" font-weight="800" fill="#1F2A33">核心业务流程：上传 → 检测结果输出</text>
    <text x="84" y="102" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="15" fill="#5B6B73">四角色协同的端到端主流程——后端只编排不推理，算法拆为独立服务</text>
  </g>

  
