<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="titleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0E7C66"/>
      <stop offset="100%" stop-color="#0A5A49"/>
    </linearGradient>
    <radialGradient id="citrusGradient" cx="38%" cy="34%" r="72%">
      <stop offset="0%" stop-color="#F9B257"/>
      <stop offset="55%" stop-color="#F2811D"/>
      <stop offset="100%" stop-color="#D9670E"/>
    </radialGradient>
    <linearGradient id="leafGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2E9E5B"/>
      <stop offset="100%" stop-color="#0E7C66"/>
    </linearGradient>
    <radialGradient id="bgDecor" cx="82%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#0E7C66" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#0E7C66" stop-opacity="0"/>
    </radialGradient>
    <filter id="badgeShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4" result="o"/>
      <feFlood flood-color="#0F172A" flood-opacity="0.12" result="c"/>
      <feComposite in="c" in2="o" operator="in" result="s"/>
      <feMerge><feMergeNode in="s"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ==================== Background ==================== -->
  <g id="bg">
    <rect width="1280" height="720" fill="#FFFFFF"/>
    <rect width="1280" height="720" fill="url(#bgDecor)"/>
    <!-- left accent rail -->
    <rect x="0" y="0" width="14" height="720" fill="url(#titleGradient)"/>
    <!-- soft ground for visual -->
    <circle cx="1000" cy="372" r="250" fill="#F4F7F6"/>
  </g>

  <!-- ==================== Citrus machine-vision visual ==================== -->
  <g id="cover-visual">
    <!-- ground shadow -->
    <ellipse cx="1000" cy="540" rx="150" ry="22" fill="#0F172A" opacity="0.08"/>
    <!-- citrus body -->
    <circle cx="1000" cy="372" r="140" fill="url(#citrusGradient)"/>
    <!-- highlight -->
    <ellipse cx="958" cy="326" rx="46" ry="34" fill="#FFFFFF" fill-opacity="0.28"/>
    <!-- skin pores -->
    <circle cx="1044" cy="338" r="3" fill="#C25A0A" fill-opacity="0.5"/>
    <circle cx="1066" cy="392" r="3" fill="#C25A0A" fill-opacity="0.5"/>
    <circle cx="978" cy="430" r="3" fill="#C25A0A" fill-opacity="0.5"/>
    <circle cx="1018" cy="300" r="3" fill="#C25A0A" fill-opacity="0.5"/>
    <!-- a surface defect (black spot) being detected -->
    <circle cx="1052" cy="418" r="15" fill="#7A3B12"/>
    <circle cx="1052" cy="418" r="15" fill="#3B1D08" fill-opacity="0.45"/>
    <!-- leaf + stem -->
    <path d="M 1000 232 q 40 -44 92 -34 q 6 50 -38 70 q -34 14 -54 -6 Z" fill="url(#leafGradient)"/>
    <path d="M 1000 232 q 18 -10 40 -22" fill="none" stroke="#0A5A49" stroke-width="2" stroke-linecap="round"/>
    <rect x="994" y="226" width="12" height="26" rx="5" fill="#8A5A2B"/>

    <!-- machine-vision scan frame (corners) -->
    <g stroke="#0E7C66" stroke-width="3" fill="none" stroke-linecap="round">
      <path d="M 846 256 v -26 h 26"/>
      <path d="M 1154 256 v -26 h -26"/>
      <path d="M 846 488 v 26 h 26"/>
      <path d="M 1154 488 v 26 h -26"/>
    </g>
    <!-- scan line -->
    <line x1="858" y1="372" x2="1142" y2="372" stroke="#0E7C66" stroke-width="2" stroke-dasharray="2,6" stroke-opacity="0.7"/>

    <!-- defect detection box -->
    <rect x="1026" y="392" width="52" height="52" rx="4" fill="none" stroke="#E0544A" stroke-width="2.5"/>
    <rect x="1026" y="376" width="92" height="18" rx="3" fill="#E0544A"/>
    <text x="1032" y="389" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">病斑 0.92</text>

    <!-- floating badge: color ratio -->
    <g filter="url(#badgeShadow)">
      <rect x="788" y="280" width="150" height="50" rx="12" fill="#FFFFFF"/>
    </g>
    <use data-icon="tabler-outline/palette" x="802" y="293" width="24" height="24" fill="#F2811D"/>
    <text x="834" y="301" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="12" fill="#5B6B73">着色率</text>
    <text x="834" y="322" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="18" font-weight="800" fill="#1F2A33">92%</text>

    <!-- floating badge: grade A -->
    <g filter="url(#badgeShadow)">
      <rect x="1058" y="470" width="138" height="52" rx="12" fill="#0E7C66"/>
    </g>
    <use data-icon="tabler-outline/circle-check" x="1072" y="484" width="24" height="24" fill="#FFFFFF"/>
    <text x="1104" y="492" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="11" fill="#BFE6D9">评定等级</text>
    <text x="1104" y="513" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="18" font-weight="800" fill="#FFFFFF">一级 · 精品</text>
  </g>

  <!-- ==================== Heading ==================== -->
  <g id="cover-heading">
    <!-- top tag pill -->
    <rect x="80" y="118" width="358" height="40" rx="20" fill="#0E7C66" fill-opacity="0.10"/>
    <use data-icon="tabler-outline/leaf" x="96" y="127" width="22" height="22" fill="#0E7C66"/>
    <text x="126" y="144" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="16" font-weight="700" fill="#0A5A49">软件工程课程设计 · 题目10 项目方案汇报</text>

    <!-- main title -->
    <text x="78" y="248" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="54" font-weight="800" fill="#1F2A33">基于机器视觉的农产品</text>
    <text x="78" y="316" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="54" font-weight="800" fill="#1F2A33">品质<tspan fill="#F2811D">分级</tspan>与<tspan fill="#E0544A">缺陷检测</tspan>系统</text>

    <!-- subtitle -->
    <rect x="80" y="356" width="6" height="56" rx="3" fill="url(#titleGradient)"/>
    <text x="102" y="382" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="24" font-weight="700" fill="#0E7C66">CitrusVision</text>
    <text x="102" y="408" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="17" fill="#5B6B73">面向肇庆本地柑橘的品质分级与缺陷检测 Web 系统</text>
  </g>

  <!-- ==================== Info ==================== -->
  <g id="cover-info">
    <line x1="80" y1="468" x2="640" y2="468" stroke="#E2E8E9" stroke-width="2"/>
    <use data-icon="tabler-outline/users" x="80" y="500" width="22" height="22" fill="#0E7C66"/>
    <text x="110" y="517" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="16" fill="#1F2A33">第 12 组 · 23 本科计科 1 班</text>
    <text x="80" y="556" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="15" fill="#5B6B73">组员：<tspan fill="#1F2A33" font-weight="700">陈绍杰</tspan>（组长）· 黄权达 · 张嘉豪 · 黄浩然</text>
    <use data-icon="tabler-outline/calendar-event" x="80" y="582" width="20" height="20" fill="#5B6B73"/>
    <text x="108" y="598" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="15" fill="#5B6B73">汇报日期 2026-06 · 指导教师 ×××</text>
  </g>

  <!-- ==================== Footer ==================== -->
  <g id="cover-footer">
    <text x="80" y="688" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="12" fill="#94A3B8">CitrusVision · 《软件工程课程设计》项目方案汇报</text>
    <text x="1200" y="688" text-anchor="end" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="12" fill="#94A3B8">01 / 18</text>
  </g>
</svg>
